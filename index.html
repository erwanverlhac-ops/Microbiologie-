<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MicrobioDraw - Éditeur de Protocoles</title>
    
    <!-- Tailwind CSS pour le style UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fabric.js pour le Canvas 2D vectoriel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Grille de repère discrète */
        .canvas-container-wrapper {
            background-color: #f8fafc;
            background-image: 
                linear-gradient(to right, #e2e8f0 1px, transparent 1px),
                linear-gradient(to bottom, #e2e8f0 1px, transparent 1px);
            background-size: 20px 20px;
        }
        
        /* Personnalisation de la scrollbar */
        .toolbox-scroll::-webkit-scrollbar { width: 6px; }
        .toolbox-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .toolbox-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .toolbox-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col bg-gray-100 overflow-hidden text-slate-800 font-sans">

    <!-- Navbar -->
    <header class="bg-white border-b border-slate-200 h-16 flex items-center justify-between px-6 shrink-0 shadow-sm z-10">
        <div class="flex items-center gap-3">
            <i data-lucide="flask-conical" class="text-blue-600 w-7 h-7"></i>
            <h1 class="text-xl font-bold text-slate-800">MicrobioDraw</h1>
            <span class="bg-blue-100 text-blue-700 text-xs font-semibold px-2 py-1 rounded-md ml-2">V2 - Édition Complète</span>
        </div>
        
        <div class="flex items-center gap-4">
            <button onclick="deleteSelected()" class="flex items-center gap-2 px-3 py-2 text-sm text-red-600 hover:bg-red-50 rounded-md transition" title="Supprimer l'élément (Touche Suppr)">
                <i data-lucide="trash-2" class="w-4 h-4"></i> Supprimer
            </button>
            <button onclick="clearCanvas()" class="flex items-center gap-2 px-3 py-2 text-sm text-slate-600 hover:bg-slate-100 rounded-md transition">
                <i data-lucide="eraser" class="w-4 h-4"></i> Effacer tout
            </button>
            
            <div class="w-px h-6 bg-slate-200 mx-1"></div>
            
            <!-- Contrôles du texte -->
            <div class="flex items-center gap-1 bg-slate-100 p-1 rounded-md border border-slate-200">
                <span class="text-xs font-semibold text-slate-500 px-2 uppercase tracking-wide">Texte</span>
                <button onclick="changeTextSize(-2)" class="flex items-center justify-center w-7 h-7 bg-white hover:bg-slate-50 border border-slate-200 text-slate-700 rounded transition shadow-sm" title="Diminuer la taille"><i data-lucide="minus" class="w-4 h-4"></i></button>
                <button onclick="changeTextSize(2)" class="flex items-center justify-center w-7 h-7 bg-white hover:bg-slate-50 border border-slate-200 text-slate-700 rounded transition shadow-sm" title="Augmenter la taille"><i data-lucide="plus" class="w-4 h-4"></i></button>
            </div>

            <!-- Contrôles de plans (Z-index) -->
            <div class="flex items-center gap-1 bg-slate-100 p-1 rounded-md border border-slate-200">
                <span class="text-xs font-semibold text-slate-500 px-2 uppercase tracking-wide">Plan</span>
                <button onclick="moveToFront()" class="flex items-center justify-center w-7 h-7 bg-white hover:bg-slate-50 border border-slate-200 text-slate-700 rounded transition shadow-sm" title="Mettre au premier plan"><i data-lucide="arrow-up-to-line" class="w-4 h-4"></i></button>
                <button onclick="moveToBack()" class="flex items-center justify-center w-7 h-7 bg-white hover:bg-slate-50 border border-slate-200 text-slate-700 rounded transition shadow-sm" title="Mettre en arrière-plan"><i data-lucide="arrow-down-to-line" class="w-4 h-4"></i></button>
            </div>

            <div class="w-px h-6 bg-slate-200 mx-1"></div>

            <!-- Export -->
            <button onclick="exportPNG()" class="flex items-center gap-2 px-4 py-2 text-sm bg-blue-600 hover:bg-blue-700 text-white rounded-md shadow-sm transition">
                <i data-lucide="image-down" class="w-4 h-4"></i> Exporter PNG
            </button>
            <button onclick="exportSVG()" class="flex items-center gap-2 px-4 py-2 text-sm bg-slate-800 hover:bg-slate-900 text-white rounded-md shadow-sm transition">
                <i data-lucide="code" class="w-4 h-4"></i> Exporter SVG
            </button>
        </div>
    </header>

    <!-- Zone principale -->
    <main class="flex-1 flex overflow-hidden">
        
        <!-- Sidebar : Boîte à outils -->
        <aside class="w-72 bg-white border-r border-slate-200 flex flex-col shrink-0 z-10 shadow-[2px_0_8px_rgba(0,0,0,0.02)]">
            <div class="p-4 border-b border-slate-100 bg-slate-50">
                <h2 class="text-sm font-semibold text-slate-600 uppercase tracking-wider">Boîte à outils</h2>
                <p class="text-xs text-slate-500 mt-1">Cliquez pour ajouter au schéma</p>
            </div>
            
            <div class="flex-1 overflow-y-auto toolbox-scroll p-4 grid grid-cols-2 gap-3 content-start">
                
                <div class="col-span-2 text-xs font-bold text-slate-400 mt-2 mb-1">Contenants & Liquides</div>
                
                <button onclick="addTube()" class="flex flex-col items-center justify-center p-3 border border-slate-200 rounded-lg hover:border-blue-400 hover:bg-blue-50 transition gap-2 group">
                    <svg viewBox="0 0 24 24" class="w-8 h-8 text-slate-600 group-hover:text-blue-600" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 2v17.5A2.5 2.5 0 0 0 11.5 22h1A2.5 2.5 0 0 0 15 19.5V2"/><path d="M8 2h8"/><path d="M9 12h6v7.5a2.5 2.5 0 0 1-2.5 2.5h-1a2.5 2.5 0 0 1-2.5-2.5V12z" fill="currentColor" opacity="0.3"/></svg>
                    <span class="text-xs font-medium text-center">Tube à essai</span>
                </button>

                <button onclick="addPetri('empty')" class="flex flex-col items-center justify-center p-3 border border-slate-200 rounded-lg hover:border-blue-400 hover:bg-blue-50 transition gap-2 group">
                    <svg viewBox="0 0 24 24" class="w-8 h-8 text-slate-600 group-hover:text-blue-600" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="8" opacity="0.2"/></svg>
                    <span class="text-xs font-medium text-center">Pétri vierge</span>
                </button>

                <button onclick="addPetri('agar')" class="flex flex-col items-center justify-center p-3 border border-slate-200 rounded-lg hover:border-amber-400 hover:bg-amber-50 transition gap-2 group">
                    <svg viewBox="0 0 24 24" class="w-8 h-8 text-amber-600" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="8" fill="currentColor" opacity="0.4"/></svg>
                    <span class="text-xs font-medium text-center">Gélose (Pétri)</span>
                </button>

                <button onclick="addPetri('colonies')" class="flex flex-col items-center justify-center p-3 border border-slate-200 rounded-lg hover:border-amber-400 hover:bg-amber-50 transition gap-2 group">
                    <svg viewBox="0 0 24 24" class="w-8 h-8 text-amber-600" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="8" fill="currentColor" opacity="0.3"/><circle cx="10" cy="10" r="1" fill="#ef4444"/><circle cx="14" cy="14" r="1.5" fill="#3b82f6"/><circle cx="9" cy="15" r="1" fill="#22c55e"/><circle cx="15" cy="9" r="1" fill="#ef4444"/></svg>
                    <span class="text-xs font-medium text-center">Colonies (Pétri)</span>
                </button>

                <button onclick="addStomacherBag()" class="flex flex-col items-center justify-center p-3 border border-slate-200 rounded-lg hover:border-blue-400 hover:bg-blue-50 transition gap-2 group">
                    <svg viewBox="0 0 24 24" class="w-8 h-8 text-slate-600 group-hover:text-blue-600" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="3" width="14" height="18" rx="2"/><path d="M5 7h14" stroke-dasharray="2 2"/><path d="M5 14s3-2 7 0 7-2 7 0v5a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-5z" fill="currentColor" opacity="0.3"/></svg>
                    <span class="text-xs font-medium text-center">Sac Stomacher</span>
                </button>

                <div class="col-span-2 text-xs font-bold text-slate-400 mt-4 mb-1">Instruments & Matériels</div>

                <button onclick="addMicropipette()" class="flex flex-col items-center justify-center p-3 border border-slate-200 rounded-lg hover:border-blue-400 hover:bg-blue-50 transition gap-2 group">
                    <svg viewBox="0 0 24 24" class="w-8 h-8 text-slate-600 group-hover:text-blue-600" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M10 7v5h4V7"/><path d="M11 12l-1 6h4l-1-6"/><path d="M11 18l1 4 1-4z" fill="currentColor" opacity="0.3"/><line x1="12" y1="1" x2="12" y2="3"/></svg>
                    <span class="text-xs font-medium text-center">Micropipette</span>
                </button>

                <button onclick="addSpreader()" class="flex flex-col items-center justify-center p-3 border border-slate-200 rounded-lg hover:border-blue-400 hover:bg-blue-50 transition gap-2 group">
                    <svg viewBox="0 0 24 24" class="w-8 h-8 text-slate-600 group-hover:text-blue-600" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v14"/><path d="M7 16h10v4" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <span class="text-xs font-medium text-center">Étaloir (Râteau)</span>
                </button>

                <button onclick="addPipette()" class="flex flex-col items-center justify-center p-3 border border-slate-200 rounded-lg hover:border-blue-400 hover:bg-blue-50 transition gap-2 group">
                    <svg viewBox="0 0 24 24" class="w-8 h-8 text-slate-600 group-hover:text-blue-600" fill="none" stroke="currentColor" stroke-width="2"><rect x="10" y="2" width="4" height="16"/><path d="M10 18l2 4 2-4"/><line x1="10" y1="6" x2="14" y2="6"/><line x1="10" y1="10" x2="14" y2="10"/><line x1="10" y1="14" x2="14" y2="14"/></svg>
                    <span class="text-xs font-medium text-center">Pipette graduée</span>
                </button>

                <button onclick="addPropipette()" class="flex flex-col items-center justify-center p-3 border border-slate-200 rounded-lg hover:border-blue-400 hover:bg-blue-50 transition gap-2 group">
                    <svg viewBox="0 0 24 24" class="w-8 h-8 text-slate-600 group-hover:text-blue-600" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="6"/><rect x="10" y="14" width="4" height="8" rx="1"/></svg>
                    <span class="text-xs font-medium text-center">Propipette</span>
                </button>

                <button onclick="addPasteurPipette()" class="flex flex-col items-center justify-center p-3 border border-slate-200 rounded-lg hover:border-blue-400 hover:bg-blue-50 transition gap-2 group">
                    <svg viewBox="0 0 24 24" class="w-8 h-8 text-slate-600 group-hover:text-blue-600" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="4" rx="3" ry="2"/><path d="M10 6v6l1.5 10h1l1.5-10V6H10z"/></svg>
                    <span class="text-xs font-medium text-center">Pipette Pasteur</span>
                </button>

                <button onclick="addStomacher()" class="flex flex-col items-center justify-center p-3 border border-slate-200 rounded-lg hover:border-blue-400 hover:bg-blue-50 transition gap-2 group">
                    <svg viewBox="0 0 24 24" class="w-8 h-8 text-slate-600 group-hover:text-blue-600" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="7" y="7" width="10" height="4" rx="1"/><path d="M7 13h10v5a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2v-5z" opacity="0.5"/></svg>
                    <span class="text-xs font-medium text-center">Stomacher</span>
                </button>
                
                <button onclick="addIncubator()" class="flex flex-col items-center justify-center p-3 border border-slate-200 rounded-lg hover:border-blue-400 hover:bg-blue-50 transition gap-2 group">
                    <svg viewBox="0 0 24 24" class="w-8 h-8 text-slate-600 group-hover:text-blue-600" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><rect x="6" y="8" width="12" height="10" rx="1"/><path d="M9 5h6" stroke-width="3" stroke-linecap="round"/><circle cx="15" cy="13" r="1" fill="currentColor"/></svg>
                    <span class="text-xs font-medium text-center">Étuve (Incubateur)</span>
                </button>

                <button onclick="addBunsenBurner()" class="flex flex-col items-center justify-center p-3 border border-slate-200 rounded-lg hover:border-orange-400 hover:bg-orange-50 transition gap-2 group">
                    <svg viewBox="0 0 24 24" class="w-8 h-8 text-slate-600 group-hover:text-orange-500" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 22h8v-2H8v2z"/><path d="M10 20V10h4v10"/><path d="M12 10c-2-3-2-6 0-8 2 2 2 5 0 8z" fill="currentColor" opacity="0.5"/></svg>
                    <span class="text-xs font-medium text-center">Bec Bunsen</span>
                </button>

                <div class="col-span-2 text-xs font-bold text-slate-400 mt-4 mb-1">Annotations</div>

                <button onclick="addArrow()" class="flex flex-col items-center justify-center p-3 border border-slate-200 rounded-lg hover:border-emerald-400 hover:bg-emerald-50 transition gap-2 group">
                    <i data-lucide="arrow-right" class="w-8 h-8 text-slate-600 group-hover:text-emerald-600"></i>
                    <span class="text-xs font-medium text-center">Flèche droite</span>
                </button>

                <button onclick="addCurvedArrow()" class="flex flex-col items-center justify-center p-3 border border-slate-200 rounded-lg hover:border-emerald-400 hover:bg-emerald-50 transition gap-2 group">
                    <svg viewBox="0 0 24 24" class="w-8 h-8 text-slate-600 group-hover:text-emerald-600" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M 6 16 A 6 6 0 0 1 18 16" />
                        <polyline points="14 12 18 16 22 12" />
                    </svg>
                    <span class="text-xs font-medium text-center">Flèche de transfert</span>
                </button>

                <button onclick="addText()" class="flex flex-col items-center justify-center p-3 border border-slate-200 rounded-lg hover:border-emerald-400 hover:bg-emerald-50 transition gap-2 group">
                    <i data-lucide="type" class="w-8 h-8 text-slate-600 group-hover:text-emerald-600"></i>
                    <span class="text-xs font-medium text-center">Texte libre</span>
                </button>

            </div>
        </aside>

        <!-- Canvas Container -->
        <section id="canvas-container" class="flex-1 relative canvas-container-wrapper w-full h-full">
            <canvas id="c"></canvas>

            <!-- Modale personnalisée (Remplace alert/prompt/confirm pour plus de modernité) -->
            <div id="custom-modal" class="hidden absolute inset-0 bg-slate-900/20 backdrop-blur-sm z-50 flex items-center justify-center">
                <div class="bg-white p-6 rounded-lg shadow-xl border border-slate-200 w-80 transform transition-all">
                    <h3 id="modal-title" class="text-lg font-bold text-slate-800 mb-2">Titre</h3>
                    <p id="modal-text" class="text-sm text-slate-600 mb-4 hidden">Message</p>
                    <input type="text" id="modal-input" class="w-full border border-slate-300 rounded-md p-2 mb-4 text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-500 hidden" autocomplete="off">
                    <div class="flex justify-end gap-2">
                        <button onclick="closeModal()" class="px-4 py-2 text-sm bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-md transition">Annuler</button>
                        <button id="modal-confirm-btn" class="px-4 py-2 text-sm bg-blue-600 hover:bg-blue-700 text-white rounded-md transition shadow-sm">Valider</button>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <script>
        lucide.createIcons();

        // Validation par la touche "Entrée" dans l'input de la modale
        document.getElementById('modal-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') document.getElementById('modal-confirm-btn').click();
        });

        const canvas = new fabric.Canvas('c', {
            preserveObjectStacking: true,
            selection: true
        });

        function resizeCanvas() {
            const container = document.getElementById('canvas-container');
            canvas.setWidth(container.clientWidth);
            canvas.setHeight(container.clientHeight);
            canvas.renderAll();
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        window.addEventListener('keydown', function(e) {
            if (e.key === 'Delete' || e.key === 'Backspace') {
                const activeObj = canvas.getActiveObject();
                if (activeObj && activeObj.isEditing) return; 
                deleteSelected();
            }
        });

        function deleteSelected() {
            const activeObjects = canvas.getActiveObjects();
            if (activeObjects.length) {
                canvas.discardActiveObject();
                activeObjects.forEach(function(object) { canvas.remove(object); });
            }
        }

        // --- GESTION DE LA MODALE SUR-MESURE ---
        let modalCallback = null;

        function showModal(options) {
            document.getElementById('custom-modal').classList.remove('hidden');
            document.getElementById('modal-title').innerText = options.title;
            
            const textEl = document.getElementById('modal-text');
            if(options.text) { textEl.innerText = options.text; textEl.classList.remove('hidden'); }
            else { textEl.classList.add('hidden'); }

            const inputEl = document.getElementById('modal-input');
            if(options.isInput) { 
                inputEl.value = options.inputValue || ''; 
                inputEl.classList.remove('hidden'); 
                inputEl.focus(); // Focus automatique sur le champ texte
            } else { 
                inputEl.classList.add('hidden'); 
            }

            const confirmBtn = document.getElementById('modal-confirm-btn');
            confirmBtn.innerText = options.btnText || 'Valider';
            confirmBtn.className = options.btnClass || 'px-4 py-2 text-sm bg-blue-600 hover:bg-blue-700 text-white rounded-md transition shadow-sm';
            
            confirmBtn.onclick = function() {
                const val = inputEl.value;
                closeModal();
                if(modalCallback) modalCallback(options.isInput ? val : true);
            };
        }

        function closeModal() {
            document.getElementById('custom-modal').classList.add('hidden');
            modalCallback = null;
        }

        function clearCanvas() {
            modalCallback = function(confirmed) {
                if(confirmed) canvas.clear();
            };
            showModal({
                title: 'Effacer le schéma',
                text: 'Êtes-vous sûr de vouloir tout effacer ? Cette action est irréversible.',
                btnText: 'Effacer',
                btnClass: 'px-4 py-2 text-sm bg-red-600 hover:bg-red-700 text-white rounded-md transition shadow-sm'
            });
        }

        // --- INTERACTION DOUBLE-CLIC ---
        canvas.on('mouse:dblclick', function(options) {
            // Si on double-clique sur l'étuve, on modifie sa température
            if (options.target && options.target.isIncubator) {
                const textObj = options.target.getObjects().find(obj => obj.type === 'text');
                if (textObj) {
                    modalCallback = function(newTemp) {
                        if (newTemp !== null && newTemp.trim() !== "") {
                            textObj.set('text', newTemp);
                            options.target.set('dirty', true); // Force le redessin du groupe par FabricJS
                            canvas.renderAll();
                        }
                    };
                    showModal({
                        title: "Température de l'étuve (°C)",
                        isInput: true,
                        inputValue: textObj.text,
                        btnText: 'Enregistrer'
                    });
                }
            }
        });

        fabric.Object.prototype.set({
            transparentCorners: false,
            cornerColor: '#3b82f6',
            cornerStrokeColor: '#2563eb',
            borderColor: '#3b82f6',
            cornerSize: 10,
            padding: 5
        });

        function centerAndAdd(obj) {
            canvas.add(obj);
            obj.center();
            canvas.setActiveObject(obj);
            canvas.renderAll();
        }

        // --- FONCTIONS UI ---
        function changeTextSize(delta) {
            const activeObj = canvas.getActiveObject();
            if (!activeObj) return;

            if (activeObj.type === 'i-text' || activeObj.type === 'text') {
                let newSize = activeObj.fontSize + delta;
                if (newSize < 8) newSize = 8;
                if (newSize > 120) newSize = 120;
                activeObj.set('fontSize', newSize);
                canvas.renderAll();
            } else if (activeObj.type === 'activeSelection') {
                let changed = false;
                activeObj.forEachObject(obj => {
                    if (obj.type === 'i-text' || obj.type === 'text') {
                        let newSize = obj.fontSize + delta;
                        if (newSize < 8) newSize = 8;
                        if (newSize > 120) newSize = 120;
                        obj.set('fontSize', newSize);
                        changed = true;
                    }
                });
                if (changed) canvas.renderAll();
            }
        }

        function moveToFront() {
            const activeObj = canvas.getActiveObject();
            if (activeObj) {
                canvas.bringToFront(activeObj);
                if (activeObj.type === 'activeSelection') canvas.discardActiveObject();
                canvas.renderAll();
            }
        }

        function moveToBack() {
            const activeObj = canvas.getActiveObject();
            if (activeObj) {
                canvas.sendToBack(activeObj);
                if (activeObj.type === 'activeSelection') canvas.discardActiveObject();
                canvas.renderAll();
            }
        }

        // --- OUTILS ANNOTATIONS ---
        function addText() {
            const text = new fabric.IText('Texte modifiable', {
                fontFamily: 'sans-serif', fontSize: 20, fill: '#1e293b', fontWeight: 'bold'
            });
            centerAndAdd(text);
        }

        function addArrow() {
            const line = new fabric.Line([0, 0, 100, 0], { stroke: '#1e293b', strokeWidth: 3, originX: 'center', originY: 'center' });
            const head = new fabric.Triangle({ width: 15, height: 15, fill: '#1e293b', left: 50, top: 0, originX: 'center', originY: 'center', angle: 90 });
            centerAndAdd(new fabric.Group([line, head], { originX: 'center', originY: 'center' }));
        }

        function addCurvedArrow() {
            const curve = new fabric.Path('M 0 50 A 50 50 0 0 1 100 50', { fill: 'transparent', stroke: '#1e293b', strokeWidth: 3 });
            const head = new fabric.Triangle({ width: 16, height: 16, fill: '#1e293b', left: 100, top: 50, originX: 'center', originY: 'bottom', angle: 180 });
            centerAndAdd(new fabric.Group([curve, head], { originX: 'center', originY: 'center' }));
        }

        // --- OUTILS LABORATOIRE ---
        function addPetri(type) {
            const groupElements = [];
            const dishBase = new fabric.Circle({ radius: 42, fill: '#cbd5e1', originX: 'center', originY: 'center', top: 2, left: 2 });
            const dish = new fabric.Circle({ radius: 40, fill: 'rgba(255, 255, 255, 0.8)', stroke: '#94a3b8', strokeWidth: 2, originX: 'center', originY: 'center' });
            const innerRim = new fabric.Circle({ radius: 38, fill: 'transparent', stroke: '#cbd5e1', strokeWidth: 1, originX: 'center', originY: 'center' });
            groupElements.push(dishBase, dish, innerRim);

            if (type === 'agar' || type === 'colonies') {
                const agar = new fabric.Circle({ radius: 37, fill: 'rgba(253, 224, 71, 0.6)', originX: 'center', originY: 'center' });
                groupElements.push(agar);
            }

            if (type === 'colonies') {
                const colors = ['#ef4444', '#f59e0b', '#3b82f6', '#22c55e', '#d946ef'];
                for(let i=0; i<15; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const rad = Math.random() * 30;
                    const col = new fabric.Circle({
                        radius: Math.random() * 2.5 + 1.5,
                        fill: colors[Math.floor(Math.random() * colors.length)],
                        left: Math.cos(angle) * rad, top: Math.sin(angle) * rad,
                        originX: 'center', originY: 'center'
                    });
                    groupElements.push(col);
                }
            }
            centerAndAdd(new fabric.Group(groupElements, { originX: 'center', originY: 'center' }));
        }

        function addTube() {
            const tubeBody = new fabric.Path('M 5 0 L 5 80 A 15 15 0 0 0 35 80 L 35 0', { fill: 'rgba(248, 250, 252, 0.4)', stroke: '#64748b', strokeWidth: 2 });
            const liquid = new fabric.Path('M 7 40 L 7 80 A 13 13 0 0 0 33 80 L 33 40 Q 20 45 7 40 Z', { fill: 'rgba(56, 189, 248, 0.5)', stroke: 'transparent' });
            const rimOuter = new fabric.Ellipse({ left: 2, top: -6, rx: 18, ry: 6, fill: 'rgba(255, 255, 255, 0.9)', stroke: '#64748b', strokeWidth: 2 });
            const rimInner = new fabric.Ellipse({ left: 7, top: -3, rx: 13, ry: 3, fill: '#e2e8f0' });
            centerAndAdd(new fabric.Group([tubeBody, liquid, rimOuter, rimInner], { originX: 'center', originY: 'center' }));
        }

        function addStomacherBag() {
            const bag = new fabric.Rect({ width: 70, height: 100, fill: 'rgba(255, 255, 255, 0.7)', stroke: '#64748b', strokeWidth: 2, rx: 4, originX: 'center', originY: 'center' });
            const seal = new fabric.Line([-35, -30, 35, -30], { stroke: '#64748b', strokeWidth: 1.5, strokeDashArray: [4, 4], originX: 'center', originY: 'center' });
            const liquid = new fabric.Path('M -34 10 L 34 10 L 34 45 A 3 3 0 0 1 31 48 L -31 48 A 3 3 0 0 1 -34 45 Z', { fill: 'rgba(253, 224, 71, 0.4)', originX: 'center', originY: 'center' });
            centerAndAdd(new fabric.Group([bag, seal, liquid], { originX: 'center', originY: 'center' }));
        }

        // --- INSTRUMENTS ---
        function addPipette() {
            const body = new fabric.Rect({ width: 14, height: 160, fill: 'rgba(241, 245, 249, 0.8)', stroke: '#475569', strokeWidth: 2, rx: 3, originX: 'center', originY: 'center' });
            const tip = new fabric.Triangle({ width: 14, height: 25, fill: 'rgba(241, 245, 249, 0.8)', stroke: '#475569', strokeWidth: 2, angle: 180, top: 92.5, originX: 'center', originY: 'center' });
            const groupElements = [body, tip];
            for(let i=0; i<12; i++) {
                const markWidth = i % 2 === 0 ? 8 : 4;
                const mark = new fabric.Line([-7, -60 + i*10, -7 + markWidth, -60 + i*10], { stroke: '#334155', strokeWidth: 1.5, originX: 'center', originY: 'center' });
                groupElements.push(mark);
            }
            centerAndAdd(new fabric.Group(groupElements, { originX: 'center', originY: 'center' }));
        }

        function addPropipette() {
            const bulbShadow = new fabric.Ellipse({ rx: 27, ry: 37, fill: '#991b1b', top: 2, left: 2, originX: 'center', originY: 'center' });
            const bulb = new fabric.Ellipse({ rx: 26, ry: 36, fill: '#ef4444', stroke: '#7f1d1d', strokeWidth: 2, originX: 'center', originY: 'center' });
            const highlight = new fabric.Ellipse({ rx: 8, ry: 12, fill: 'rgba(255,255,255,0.4)', top: -15, left: -10, originX: 'center', originY: 'center', angle: -20 });
            const bottomValv = new fabric.Rect({ width: 16, height: 24, fill: '#ef4444', stroke: '#7f1d1d', strokeWidth: 2, top: 40, rx: 4, originX: 'center', originY: 'center' });
            const sideValv = new fabric.Circle({ radius: 10, fill: '#ef4444', stroke: '#7f1d1d', strokeWidth: 2, left: 24, top: -12, originX: 'center', originY: 'center' });
            centerAndAdd(new fabric.Group([bulbShadow, bulb, highlight, bottomValv, sideValv], { originX: 'center', originY: 'center' }));
        }

        function addPasteurPipette() {
            const glass = new fabric.Path('M -6 0 L 6 0 L 6 60 L 2 120 L -2 120 L -6 60 Z', { fill: 'rgba(248, 250, 252, 0.8)', stroke: '#64748b', strokeWidth: 2, top: 20, originX: 'center', originY: 'center' });
            const bulb = new fabric.Ellipse({ rx: 14, ry: 20, fill: '#ef4444', stroke: '#b91c1c', strokeWidth: 2, top: -40, originX: 'center', originY: 'center' });
            centerAndAdd(new fabric.Group([glass, bulb], { originX: 'center', originY: 'center' }));
        }

        function addStomacher() {
            const chassis = new fabric.Rect({ width: 110, height: 130, fill: '#cbd5e1', stroke: '#334155', strokeWidth: 2, rx: 8, originX: 'center', originY: 'center' });
            const innerPanel = new fabric.Rect({ width: 90, height: 110, fill: '#e2e8f0', top: 5, rx: 4, originX: 'center', originY: 'center' });
            const screen = new fabric.Rect({ width: 50, height: 20, fill: '#0f172a', rx: 2, top: -35, originX: 'center', originY: 'center' });
            const door = new fabric.Rect({ width: 80, height: 75, fill: 'rgba(255,255,255,0.7)', stroke: '#94a3b8', strokeWidth: 2, rx: 4, top: 20, originX: 'center', originY: 'center' });
            const bag = new fabric.Path('M -25 -20 L 25 -20 L 30 30 L -30 30 Z', { fill: 'rgba(186, 230, 253, 0.5)', stroke: '#0284c7', strokeWidth: 1.5, top: 20, originX: 'center', originY: 'center' });
            const liquid = new fabric.Path('M -28 5 L 28 5 L 30 30 L -30 30 Z', { fill: 'rgba(253, 224, 71, 0.7)', top: 20, originX: 'center', originY: 'center' });
            centerAndAdd(new fabric.Group([chassis, innerPanel, screen, door, bag, liquid], { originX: 'center', originY: 'center' }));
        }

        function addBunsenBurner() {
            const base = new fabric.Path('M -20 40 L 20 40 L 15 30 L -15 30 Z', { fill: '#334155', stroke: '#1e293b', strokeWidth: 2, originX: 'center', originY: 'center' });
            const pipe = new fabric.Rect({ width: 14, height: 40, fill: '#94a3b8', stroke: '#475569', strokeWidth: 2, top: 10, originX: 'center', originY: 'center' });
            const collar = new fabric.Rect({ width: 18, height: 10, fill: '#cbd5e1', stroke: '#475569', strokeWidth: 2, top: 20, rx: 1, originX: 'center', originY: 'center' });
            const hoseConnector = new fabric.Rect({ width: 12, height: 6, fill: '#94a3b8', stroke: '#475569', strokeWidth: 2, top: 25, left: 10, originX: 'center', originY: 'center' }); 
            const flameOuter = new fabric.Path('M 0 0 Q -12 -15 0 -35 Q 12 -15 0 0', { fill: 'rgba(249, 115, 22, 0.7)', originX: 'center', originY: 'center', top: -27 });
            const flameInner = new fabric.Path('M 0 0 Q -6 -8 0 -20 Q 6 -8 0 0', { fill: 'rgba(56, 189, 248, 0.9)', originX: 'center', originY: 'center', top: -20 });
            centerAndAdd(new fabric.Group([hoseConnector, base, pipe, collar, flameOuter, flameInner], { originX: 'center', originY: 'center' }));
        }
        
        // Micropipette (Eppendorf)
        function addMicropipette() {
            // Bouton poussoir
            const plunger = new fabric.Rect({ width: 14, height: 15, fill: '#cbd5e1', stroke: '#475569', strokeWidth: 2, top: -75, rx: 2, originX: 'center', originY: 'center' });
            // Haut du corps
            const topBody = new fabric.Rect({ width: 26, height: 40, fill: '#f1f5f9', stroke: '#475569', strokeWidth: 2, top: -50, rx: 3, originX: 'center', originY: 'center' });
            // Écran de volume (jaune/vert)
            const volumeScreen = new fabric.Rect({ width: 14, height: 20, fill: '#bef264', stroke: '#475569', strokeWidth: 1.5, top: -50, originX: 'center', originY: 'center' });
            // Bas du corps
            const bottomBody = new fabric.Path('M -10 -20 L 10 -20 L 4 30 L -4 30 Z', { fill: '#e2e8f0', stroke: '#475569', strokeWidth: 2, top: 5, originX: 'center', originY: 'center' });
            // Cône jetable
            const tip = new fabric.Path('M -4 0 L 4 0 L 1 35 L -1 35 Z', { fill: 'rgba(186, 230, 253, 0.4)', stroke: '#38bdf8', strokeWidth: 1.5, top: 40, originX: 'center', originY: 'center' });

            centerAndAdd(new fabric.Group([plunger, topBody, volumeScreen, bottomBody, tip], { originX: 'center', originY: 'center' }));
        }

        // Étaloir / Râteau (Drigalski)
        function addSpreader() {
            // Manche
            const handle = new fabric.Rect({ width: 6, height: 80, fill: 'rgba(241, 245, 249, 0.8)', stroke: '#64748b', strokeWidth: 2, top: -20, rx: 3, originX: 'center', originY: 'center' });
            // Râteau horizontal
            const crossbar = new fabric.Rect({ width: 50, height: 6, fill: 'rgba(241, 245, 249, 0.8)', stroke: '#64748b', strokeWidth: 2, top: 20, rx: 3, originX: 'center', originY: 'center' });
            // Bout recourbé
            const endCurve = new fabric.Rect({ width: 6, height: 15, fill: 'rgba(241, 245, 249, 0.8)', stroke: '#64748b', strokeWidth: 2, top: 15, left: 22, rx: 3, originX: 'center', originY: 'center' });

            centerAndAdd(new fabric.Group([handle, crossbar, endCurve], { originX: 'center', originY: 'center' }));
        }

        // Étuve (Incubateur)
        function addIncubator() {
            // Boîtier principal
            const chassis = new fabric.Rect({ width: 140, height: 160, fill: '#f8fafc', stroke: '#475569', strokeWidth: 2, rx: 4, originX: 'center', originY: 'center' });
            // Panneau supérieur
            const controlPanel = new fabric.Rect({ width: 140, height: 30, fill: '#e2e8f0', stroke: '#475569', strokeWidth: 2, top: -65, originX: 'center', originY: 'center' });
            // Écran digital rouge
            const display = new fabric.Rect({ width: 40, height: 16, fill: '#0f172a', rx: 2, top: -65, left: -30, originX: 'center', originY: 'center' });
            const tempText = new fabric.Text('37.0', { fontFamily: 'monospace', fontSize: 12, fill: '#ef4444', top: -65, left: -30, originX: 'center', originY: 'center' });
            // Boutons
            const btn1 = new fabric.Circle({ radius: 4, fill: '#94a3b8', stroke: '#475569', strokeWidth: 1, top: -65, left: 10, originX: 'center', originY: 'center' });
            const btn2 = new fabric.Circle({ radius: 4, fill: '#94a3b8', stroke: '#475569', strokeWidth: 1, top: -65, left: 25, originX: 'center', originY: 'center' });
            // Porte vitrée
            const door = new fabric.Rect({ width: 110, height: 100, fill: 'rgba(186, 230, 253, 0.2)', stroke: '#94a3b8', strokeWidth: 2, rx: 2, top: 15, originX: 'center', originY: 'center' });
            // Poignée de porte
            const handle = new fabric.Rect({ width: 8, height: 40, fill: '#cbd5e1', stroke: '#64748b', strokeWidth: 1, rx: 2, top: 15, left: 45, originX: 'center', originY: 'center' });
            // Étagère grille intérieure
            const shelf = new fabric.Line([-45, 25, 45, 25], { stroke: '#cbd5e1', strokeWidth: 2, strokeDashArray: [2, 2], originX: 'center', originY: 'center' });

            const incubatorGroup = new fabric.Group([chassis, controlPanel, display, tempText, btn1, btn2, door, handle, shelf], { originX: 'center', originY: 'center' });
            
            // On ajoute une balise personnalisée au groupe pour le détecter au double-clic
            incubatorGroup.set({ isIncubator: true }); 
            
            centerAndAdd(incubatorGroup);
        }

        // --- EXPORTATION ---
        function exportPNG() {
            canvas.discardActiveObject();
            canvas.renderAll();
            const link = document.createElement('a');
            link.download = 'protocole_microbio.png';
            link.href = canvas.toDataURL({ format: 'png', multiplier: 2, backgroundColor: '#ffffff' });
            link.click();
        }

        function exportSVG() {
            canvas.discardActiveObject();
            canvas.renderAll();
            const blob = new Blob([canvas.toSVG()], {type: "image/svg+xml;charset=utf-8"});
            const link = document.createElement('a');
            link.download = 'protocole_microbio.svg';
            link.href = URL.createObjectURL(blob);
            link.click();
        }
    </script>
</body>
</html>
