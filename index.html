<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MicrobioDraw - Éditeur de Protocoles</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Zone de dessin défilable avec fond gris */
        .workspace-wrapper {
            background-color: #e2e8f0;
            overflow: auto;
            position: relative;
        }
        
        /* La grande feuille blanche avec grille */
        .canvas-container-wrapper {
            background-color: #ffffff;
            background-image: 
                linear-gradient(to right, #f8fafc 1px, transparent 1px),
                linear-gradient(to bottom, #f8fafc 1px, transparent 1px);
            background-size: 20px 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            margin: 2rem auto;
        }
        
        .toolbox-scroll::-webkit-scrollbar { width: 6px; }
        .toolbox-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .toolbox-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .toolbox-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Style spécifique pour le color picker natif */
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 4px; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col bg-gray-100 overflow-hidden text-slate-800 font-sans">

    <!-- Navbar -->
    <header class="bg-white border-b border-slate-200 h-16 flex items-center justify-between px-4 shrink-0 shadow-sm z-10 overflow-x-auto">
        <div class="flex items-center gap-2 shrink-0 pr-2">
            <i data-lucide="flask-conical" class="text-blue-600 w-7 h-7" title="MicrobioDraw"></i>
            <span class="bg-blue-100 text-blue-700 text-xs font-semibold px-2 py-1 rounded-md">V2 Pro</span>
        </div>
        <div class="flex items-center gap-2 shrink-0">
            <button onclick="deleteSelected()" class="flex items-center gap-1 px-2 py-2 text-sm text-red-600 hover:bg-red-50 rounded-md transition" title="Supprimer l'élément (Touche Suppr)">
                <i data-lucide="trash-2" class="w-4 h-4"></i> <span class="hidden lg:inline">Supprimer</span>
            </button>
            <div class="w-px h-6 bg-slate-200 hidden lg:block"></div>
            <button onclick="confirmClearCanvas()" class="flex items-center gap-1 px-2 py-2 text-sm text-slate-600 hover:bg-slate-100 rounded-md transition" title="Effacer tout">
                <i data-lucide="eraser" class="w-4 h-4"></i> <span class="hidden lg:inline">Effacer</span>
            </button>
            
            <div class="w-px h-6 bg-slate-200 mx-1"></div>
            
            <!-- Contrôles Taille de texte -->
            <div class="flex items-center gap-1 bg-slate-100 p-1 rounded-md border border-slate-200">
                <span class="text-xs font-semibold text-slate-500 px-2 uppercase tracking-wide">Texte</span>
                <button onclick="changeTextSize(-2)" class="flex items-center justify-center w-7 h-7 bg-white hover:bg-slate-50 border border-slate-200 text-slate-700 rounded transition shadow-sm" title="Diminuer la taille"><i data-lucide="minus" class="w-4 h-4"></i></button>
                <button onclick="changeTextSize(2)" class="flex items-center justify-center w-7 h-7 bg-white hover:bg-slate-50 border border-slate-200 text-slate-700 rounded transition shadow-sm" title="Augmenter la taille"><i data-lucide="plus" class="w-4 h-4"></i></button>
            </div>

            <!-- Contrôles Z-index -->
            <div class="flex items-center gap-1 bg-slate-100 p-1 rounded-md border border-slate-200">
                <span class="text-xs font-semibold text-slate-500 px-2 uppercase tracking-wide">Plan</span>
                <button onclick="moveToFront()" class="flex items-center justify-center w-7 h-7 bg-white hover:bg-slate-50 border border-slate-200 text-slate-700 rounded transition shadow-sm" title="Mettre au premier plan"><i data-lucide="arrow-up-to-line" class="w-4 h-4"></i></button>
                <button onclick="moveToBack()" class="flex items-center justify-center w-7 h-7 bg-white hover:bg-slate-50 border border-slate-200 text-slate-700 rounded transition shadow-sm" title="Mettre en arrière-plan"><i data-lucide="arrow-down-to-line" class="w-4 h-4"></i></button>
            </div>

            <!-- NOUVEAU : Color Picker pour liquides -->
            <div class="flex items-center gap-2 bg-slate-100 p-1 rounded-md border border-slate-200 pl-2">
                <span class="text-xs font-semibold text-slate-500 uppercase tracking-wide">Liquide</span>
                <input type="color" id="liquidColorPicker" class="w-7 h-7 rounded cursor-pointer border-0 p-0 bg-transparent opacity-50" title="Changer la couleur du liquide (sélectionnez un objet)" disabled value="#cccccc">
            </div>

            <!-- NOUVEAU : Color Picker pour Colonies -->
            <div class="flex items-center gap-2 bg-slate-100 p-1 rounded-md border border-slate-200 pl-2">
                <span class="text-xs font-semibold text-slate-500 uppercase tracking-wide">Colonies</span>
                <input type="color" id="coloniesColorPicker" class="w-7 h-7 rounded cursor-pointer border-0 p-0 bg-transparent opacity-50" title="Changer la couleur des colonies (sélectionnez une boîte)" disabled value="#cccccc">
            </div>

            <div class="w-px h-6 bg-slate-200 mx-1"></div>

            <!-- NOUVEAU : Contrôles d'Import / Export JSON -->
            <input type="file" id="importJsonInput" accept=".json" class="hidden" onchange="importJSON(event)">
            <button onclick="triggerImport()" class="flex items-center gap-1 px-3 py-2 text-sm text-slate-600 hover:bg-slate-100 rounded-md transition" title="Ouvrir un projet (JSON)">
                <i data-lucide="folder-open" class="w-4 h-4"></i> <span class="hidden xl:inline">Ouvrir</span>
            </button>
            <button onclick="exportJSON()" class="flex items-center gap-1 px-3 py-2 text-sm text-slate-600 hover:bg-slate-100 rounded-md transition" title="Sauvegarder le projet (JSON)">
                <i data-lucide="save" class="w-4 h-4"></i> <span class="hidden xl:inline">Sauvegarder</span>
            </button>

            <div class="w-px h-6 bg-slate-200 mx-1"></div>

            <button onclick="exportPNG()" class="flex items-center gap-2 px-4 py-2 text-sm bg-blue-600 hover:bg-blue-700 text-white rounded-md shadow-sm transition">
                <i data-lucide="image-down" class="w-4 h-4"></i> Exporter PNG
            </button>
            
            <button onclick="exportSVG()" class="flex items-center gap-2 px-4 py-2 text-sm bg-slate-800 hover:bg-slate-900 text-white rounded-md shadow-sm transition">
                <i data-lucide="file-code" class="w-4 h-4"></i> Exporter SVG
            </button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        
        <!-- Sidebar : Boîte à outils -->
        <aside class="w-72 bg-white border-r border-slate-200 flex flex-col shrink-0 z-10 shadow-[2px_0_8px_rgba(0,0,0,0.02)]">
            <div class="p-4 border-b border-slate-100 bg-slate-50">
                <h2 class="text-sm font-semibold text-slate-600 uppercase tracking-wider">Boîte à outils</h2>
                <p class="text-xs text-slate-500 mt-1">Cliquez pour ajouter au schéma</p>
            </div>
            
            <div class="flex-1 overflow-y-auto toolbox-scroll p-4 grid grid-cols-2 gap-3 content-start">
                
                <div class="col-span-2 text-xs font-bold text-slate-400 mt-2 mb-1">Contenants & Liquides</div>
                
                <button onclick="addTube()" class="flex flex-col items-center justify-center p-3 border border-slate-200 rounded-lg hover:border-blue-400 hover:bg-blue-50 transition gap-2 group">
                    <svg viewBox="0 0 24 24" class="w-8 h-8 text-slate-600 group-hover:text-blue-600" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 2v17.5A2.5 2.5 0 0 0 11.5 22h1A2.5 2.5 0 0 0 15 19.5V2"/><path d="M8 2h8"/><path d="M9 12h6v7.5a2.5 2.5 0 0 1-2.5 2.5h-1a2.5 2.5 0 0 1-2.5-2.5V12z" fill="currentColor" opacity="0.3"/></svg>
                    <span class="text-xs font-medium text-center">Tube à essai</span>
                </button>

                <!-- NOUVEAU : Portoir de tubes et Bouchon -->
                <button onclick="addTubeRack()" class="flex flex-col items-center justify-center p-3 border border-slate-200 rounded-lg hover:border-blue-400 hover:bg-blue-50 transition gap-2 group">
                    <svg viewBox="0 0 24 24" class="w-8 h-8 text-slate-600 group-hover:text-blue-600" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 14h16v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-6z" fill="currentColor" opacity="0.2"/><path d="M4 14h16v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-6z"/><path d="M4 10h16"/><path d="M6 4v10 M12 4v10 M18 4v10"/><path d="M5 4h2 M11 4h2 M17 4h2"/></svg>
                    <span class="text-xs font-medium text-center">Portoir (Tubes)</span>
                </button>

                <button onclick="addTubeCap()" class="flex flex-col items-center justify-center p-3 border border-slate-200 rounded-lg hover:border-blue-400 hover:bg-blue-50 transition gap-2 group">
                    <svg viewBox="0 0 24 24" class="w-8 h-8 text-slate-600 group-hover:text-blue-600" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 4h12l-2 12H8z" fill="currentColor" opacity="0.3"/><path d="M6 4h12l-2 12H8z"/><path d="M5 4h14"/></svg>
                    <span class="text-xs font-medium text-center">Bouchon</span>
                </button>

                <button onclick="addPetri('empty')" class="flex flex-col items-center justify-center p-3 border border-slate-200 rounded-lg hover:border-blue-400 hover:bg-blue-50 transition gap-2 group">
                    <svg viewBox="0 0 24 24" class="w-8 h-8 text-slate-600 group-hover:text-blue-600" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="8" opacity="0.2"/></svg>
                    <span class="text-xs font-medium text-center">Pétri vierge</span>
                </button>

                <button onclick="addPetri('agar')" class="flex flex-col items-center justify-center p-3 border border-slate-200 rounded-lg hover:border-amber-400 hover:bg-amber-50 transition gap-2 group">
                    <svg viewBox="0 0 24 24" class="w-8 h-8 text-amber-600" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="8" fill="currentColor" opacity="0.4"/></svg>
                    <span class="text-xs font-medium text-center">Gélose (Pétri)</span>
                </button>

                <button onclick="addPetri('colonies')" class="flex flex-col items-center justify-center p-3 border border-slate-200 rounded-lg hover:border-amber-400 hover:bg-amber-50 transition gap-2 group">
                    <svg viewBox="0 0 24 24" class="w-8 h-8 text-amber-600" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="8" fill="currentColor" opacity="0.3"/><circle cx="10" cy="10" r="1" fill="#ef4444"/><circle cx="14" cy="14" r="1.5" fill="#3b82f6"/><circle cx="9" cy="15" r="1" fill="#22c55e"/><circle cx="15" cy="9" r="1" fill="#ef4444"/></svg>
                    <span class="text-xs font-medium text-center">Colonies (Pétri)</span>
                </button>

                <button onclick="addErlenmeyer()" class="flex flex-col items-center justify-center p-3 border border-slate-200 rounded-lg hover:border-blue-400 hover:bg-blue-50 transition gap-2 group">
                    <svg viewBox="0 0 24 24" class="w-8 h-8 text-slate-600 group-hover:text-blue-600" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 2v6l-6 12a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1l-6-12V2"/><path d="M8 2h8"/><path d="M5 16h14" opacity="0.3" fill="currentColor"/></svg>
                    <span class="text-xs font-medium text-center">Erlenmeyer</span>
                </button>

                <button onclick="addBeaker()" class="flex flex-col items-center justify-center p-3 border border-slate-200 rounded-lg hover:border-blue-400 hover:bg-blue-50 transition gap-2 group">
                    <svg viewBox="0 0 24 24" class="w-8 h-8 text-slate-600 group-hover:text-blue-600" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 3 L6 20 A2 2 0 0 0 8 22 L16 22 A2 2 0 0 0 18 20 L18 3 M5 3 L19 3 M18 5 L20 6 L18 7"/><path d="M6 12 L18 12" stroke-dasharray="2 2"/></svg>
                    <span class="text-xs font-medium text-center">Bécher</span>
                </button>

                <button onclick="addStomacherBag()" class="flex flex-col items-center justify-center p-3 border border-slate-200 rounded-lg hover:border-blue-400 hover:bg-blue-50 transition gap-2 group">
                    <svg viewBox="0 0 24 24" class="w-8 h-8 text-slate-600 group-hover:text-blue-600" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="3" width="14" height="18" rx="2"/><path d="M5 7h14" stroke-dasharray="2 2"/><path d="M5 14s3-2 7 0 7-2 7 0v5a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-5z" fill="currentColor" opacity="0.3"/></svg>
                    <span class="text-xs font-medium text-center">Sac Stomacher</span>
                </button>

                <!-- NOUVEAU : Flacon de Gélose -->
                <button onclick="addFlask()" class="flex flex-col items-center justify-center p-3 border border-slate-200 rounded-lg hover:border-blue-400 hover:bg-blue-50 transition gap-2 group">
                    <svg viewBox="0 0 24 24" class="w-8 h-8 text-slate-600 group-hover:text-blue-600" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 2v7.31L8 12.5A2 2 0 0 0 8 14v6a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2v-6a2 2 0 0 0-.27-1L14 9.31V2"/><rect x="8" y="2" width="8" height="4" fill="currentColor" opacity="0.3"/><path d="M8 16h8" opacity="0.3"/></svg>
                    <span class="text-xs font-medium text-center">Flacon (Gélose)</span>
                </button>

                <!-- NOUVELLE CATÉGORIE : Produits -->
                <div class="col-span-2 text-xs font-bold text-slate-400 mt-4 mb-1">Produits & Échantillons</div>

                <button onclick="addShrimp()" class="flex flex-col items-center justify-center p-3 border border-slate-200 rounded-lg hover:border-orange-400 hover:bg-orange-50 transition gap-2 group">
                    <svg viewBox="0 0 24 24" class="w-8 h-8 text-orange-500" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 10 A 6 6 0 0 1 20 10 A 8 8 0 0 1 10 20" stroke-linecap="round"/><path d="M10 20 L 6 22 L 8 17"/><circle cx="16" cy="6" r="1" fill="currentColor"/></svg>
                    <span class="text-xs font-medium text-center">Crevette</span>
                </button>

                <button onclick="addBlackPudding()" class="flex flex-col items-center justify-center p-3 border border-slate-200 rounded-lg hover:border-red-900 hover:bg-red-50 transition gap-2 group">
                    <svg viewBox="0 0 24 24" class="w-8 h-8 text-red-900" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="8" width="16" height="8" rx="4"/><path d="M4 12 H 2 M20 12 H 22"/></svg>
                    <span class="text-xs font-medium text-center">Boudin noir</span>
                </button>

                <div class="col-span-2 text-xs font-bold text-slate-400 mt-4 mb-1">Instruments & Appareils</div>

                <button onclick="addMicropipette()" class="flex flex-col items-center justify-center p-3 border border-slate-200 rounded-lg hover:border-blue-400 hover:bg-blue-50 transition gap-2 group">
                    <svg viewBox="0 0 24 24" class="w-8 h-8 text-slate-600 group-hover:text-blue-600" fill="none" stroke="currentColor" stroke-width="2"><rect x="10" y="4" width="4" height="12" rx="1"/><path d="M12 2v2"/><path d="M11 16l-1 5a1 1 0 0 0 1 1h2a1 1 0 0 0 1-1l-1-5"/></svg>
                    <span class="text-xs font-medium text-center">Micropipette</span>
                </button>

                <button onclick="addPipette()" class="flex flex-col items-center justify-center p-3 border border-slate-200 rounded-lg hover:border-blue-400 hover:bg-blue-50 transition gap-2 group">
                    <svg viewBox="0 0 24 24" class="w-8 h-8 text-slate-600 group-hover:text-blue-600" fill="none" stroke="currentColor" stroke-width="2"><rect x="10" y="2" width="4" height="16"/><path d="M10 18l2 4 2-4"/><line x1="10" y1="6" x2="14" y2="6"/><line x1="10" y1="10" x2="14" y2="10"/><line x1="10" y1="14" x2="14" y2="14"/></svg>
                    <span class="text-xs font-medium text-center">Pipette graduée</span>
                </button>

                <button onclick="addPasteurPipette()" class="flex flex-col items-center justify-center p-3 border border-slate-200 rounded-lg hover:border-blue-400 hover:bg-blue-50 transition gap-2 group">
                    <svg viewBox="0 0 24 24" class="w-8 h-8 text-slate-600 group-hover:text-blue-600" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="4" rx="3" ry="2"/><path d="M10 6v6l1.5 10h1l1.5-10V6H10z"/></svg>
                    <span class="text-xs font-medium text-center">Pipette Pasteur</span>
                </button>

                <button onclick="addPropipette()" class="flex flex-col items-center justify-center p-3 border border-slate-200 rounded-lg hover:border-blue-400 hover:bg-blue-50 transition gap-2 group">
                    <svg viewBox="0 0 24 24" class="w-8 h-8 text-slate-600 group-hover:text-blue-600" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="6"/><rect x="10" y="14" width="4" height="8" rx="1"/></svg>
                    <span class="text-xs font-medium text-center">Propipette</span>
                </button>

                <button onclick="addSpreader()" class="flex flex-col items-center justify-center p-3 border border-slate-200 rounded-lg hover:border-blue-400 hover:bg-blue-50 transition gap-2 group">
                    <svg viewBox="0 0 24 24" class="w-8 h-8 text-slate-600 group-hover:text-blue-600" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22 V8 M8 8 L16 8 M16 8 V5"/></svg>
                    <span class="text-xs font-medium text-center">Râteau (Étaloir)</span>
                </button>

                <button onclick="addEppendorf()" class="flex flex-col items-center justify-center p-3 border border-slate-200 rounded-lg hover:border-blue-400 hover:bg-blue-50 transition gap-2 group">
                    <svg viewBox="0 0 24 24" class="w-8 h-8 text-slate-600 group-hover:text-blue-600" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 4v12l3 5 3-5V4H9z"/><path d="M7 4h10"/><path d="M17 4c1 0 2-1 2-2H5"/></svg>
                    <span class="text-xs font-medium text-center">Tube Eppendorf</span>
                </button>

                <button onclick="addStomacher()" class="flex flex-col items-center justify-center p-3 border border-slate-200 rounded-lg hover:border-blue-400 hover:bg-blue-50 transition gap-2 group">
                    <svg viewBox="0 0 24 24" class="w-8 h-8 text-slate-600 group-hover:text-blue-600" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="7" y="7" width="10" height="4" rx="1"/><path d="M7 13h10v5a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2v-5z" opacity="0.5"/></svg>
                    <span class="text-xs font-medium text-center">Stomacher</span>
                </button>

                <button onclick="addMicrocentrifuge()" class="flex flex-col items-center justify-center p-3 border border-slate-200 rounded-lg hover:border-blue-400 hover:bg-blue-50 transition gap-2 group">
                    <svg viewBox="0 0 24 24" class="w-8 h-8 text-slate-600 group-hover:text-blue-600" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 10h16v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V10z"/><path d="M4 10c0-4 4-6 8-6s8 2 8 6"/><circle cx="12" cy="15" r="3" fill="currentColor" opacity="0.3"/></svg>
                    <span class="text-xs font-medium text-center">Centrifugeuse</span>
                </button>

                <button onclick="addIncubator()" class="flex flex-col items-center justify-center p-3 border border-slate-200 rounded-lg hover:border-blue-400 hover:bg-blue-50 transition gap-2 group">
                    <svg viewBox="0 0 24 24" class="w-8 h-8 text-slate-600 group-hover:text-blue-600" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><rect x="8" y="6" width="8" height="4" rx="1"/><path d="M6 14h12M6 18h12"/></svg>
                    <span class="text-xs font-medium text-center">Étuve (Incubateur)</span>
                </button>

                <!-- NOUVEAU : Balance de précision -->
                <button onclick="addBalance()" class="flex flex-col items-center justify-center p-3 border border-slate-200 rounded-lg hover:border-blue-400 hover:bg-blue-50 transition gap-2 group">
                    <svg viewBox="0 0 24 24" class="w-8 h-8 text-slate-600 group-hover:text-blue-600" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="12" width="18" height="8" rx="2"/><path d="M6 12V8h12v4"/><rect x="7" y="14" width="6" height="4" rx="1" fill="currentColor" opacity="0.4" stroke="none"/></svg>
                    <span class="text-xs font-medium text-center">Balance</span>
                </button>

                <button onclick="addBunsenBurner()" class="flex flex-col items-center justify-center p-3 border border-slate-200 rounded-lg hover:border-orange-400 hover:bg-orange-50 transition gap-2 group">
                    <svg viewBox="0 0 24 24" class="w-8 h-8 text-slate-600 group-hover:text-orange-500" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 22h8v-2H8v2z"/><path d="M10 20V10h4v10"/><path d="M12 10c-2-3-2-6 0-8 2 2 2 5 0 8z" fill="currentColor" opacity="0.5"/></svg>
                    <span class="text-xs font-medium text-center">Bec Bunsen</span>
                </button>

                <div class="col-span-2 text-xs font-bold text-slate-400 mt-4 mb-1">Annotations & Badges</div>

                <!-- NOUVEAU : Puce numérotée (Badge) -->
                <button onclick="addBadge()" class="flex flex-col items-center justify-center p-3 border border-slate-200 rounded-lg hover:border-emerald-400 hover:bg-emerald-50 transition gap-2 group">
                    <svg viewBox="0 0 24 24" class="w-8 h-8 text-slate-600 group-hover:text-emerald-600" fill="currentColor"><circle cx="12" cy="12" r="10"/><text x="12" y="16" text-anchor="middle" fill="white" font-weight="bold" font-family="sans-serif" font-size="12">1</text></svg>
                    <span class="text-xs font-medium text-center">Puce numérotée</span>
                </button>

                <button onclick="addArrow()" class="flex flex-col items-center justify-center p-3 border border-slate-200 rounded-lg hover:border-emerald-400 hover:bg-emerald-50 transition gap-2 group">
                    <i data-lucide="arrow-right" class="w-8 h-8 text-slate-600 group-hover:text-emerald-600"></i>
                    <span class="text-xs font-medium text-center">Flèche droite</span>
                </button>

                <button onclick="addCurvedArrow()" class="flex flex-col items-center justify-center p-3 border border-slate-200 rounded-lg hover:border-emerald-400 hover:bg-emerald-50 transition gap-2 group">
                    <svg viewBox="0 0 24 24" class="w-8 h-8 text-slate-600 group-hover:text-emerald-600" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M 6 16 A 6 6 0 0 1 18 16" /><polyline points="14 12 18 16 22 12" /></svg>
                    <span class="text-xs font-medium text-center">Flèche de transfert</span>
                </button>

                <button onclick="addText()" class="flex flex-col items-center justify-center p-3 border border-slate-200 rounded-lg hover:border-emerald-400 hover:bg-emerald-50 transition gap-2 group">
                    <i data-lucide="type" class="w-8 h-8 text-slate-600 group-hover:text-emerald-600"></i>
                    <span class="text-xs font-medium text-center">Texte libre</span>
                </button>

            </div>
        </aside>

        <!-- Zone de travail avec Scroll (La grande feuille) -->
        <section class="flex-1 workspace-wrapper" id="workspace">
            <div class="canvas-container-wrapper" style="width: 2400px; height: 1600px;">
                <canvas id="c" width="2400" height="1600"></canvas>
            </div>
        </section>

    </main>

    <!-- Modale Personnalisée (Pour remplacer les alert() et prompt()) -->
    <div id="customModal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center">
        <div class="bg-white rounded-xl shadow-2xl p-6 w-80 transform transition-all">
            <h3 id="modalTitle" class="text-lg font-bold text-slate-800 mb-2">Titre</h3>
            <div id="modalContent" class="mb-5 text-slate-600 text-sm">Contenu</div>
            <div class="flex justify-end gap-2">
                <button onclick="closeModal()" class="px-4 py-2 text-sm font-medium text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-lg transition">Annuler</button>
                <button id="modalActionBtn" class="px-4 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg transition shadow-sm">Valider</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Initialisation de Fabric.js avec une grande taille fixe
        const canvas = new fabric.Canvas('c', {
            preserveObjectStacking: true,
            selection: true
        });

        // Apparence globale de sélection
        fabric.Object.prototype.set({
            transparentCorners: false,
            cornerColor: '#3b82f6',
            cornerStrokeColor: '#2563eb',
            borderColor: '#3b82f6',
            cornerSize: 10,
            padding: 5
        });

        // Supprimer via clavier
        window.addEventListener('keydown', function(e) {
            if (e.key === 'Delete' || e.key === 'Backspace') {
                const activeObj = canvas.getActiveObject();
                if (activeObj && activeObj.isEditing) return; 
                deleteSelected();
            }
        });

        function deleteSelected() {
            const activeObjects = canvas.getActiveObjects();
            if (activeObjects.length) {
                canvas.discardActiveObject();
                activeObjects.forEach(function(object) { canvas.remove(object); });
            }
        }

        const modal = document.getElementById('customModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalContent = document.getElementById('modalContent');
        const modalActionBtn = document.getElementById('modalActionBtn');

        function openModal(title, htmlContent, buttonText, buttonClass, actionCallback) {
            modalTitle.innerText = title;
            modalContent.innerHTML = htmlContent;
            modalActionBtn.innerText = buttonText;
            modalActionBtn.className = `px-4 py-2 text-sm font-medium text-white rounded-lg transition shadow-sm ${buttonClass}`;
            modal.classList.remove('hidden');
            
            modalActionBtn.onclick = () => {
                if (actionCallback) actionCallback();
                closeModal();
            };
        }

        function closeModal() { modal.classList.add('hidden'); }

        function confirmClearCanvas() {
            openModal("Effacer le tableau", "Êtes-vous sûr de vouloir supprimer tous les éléments ? Cette action est irréversible.", "Tout effacer", "bg-red-600 hover:bg-red-700", () => canvas.clear());
        }

        // Placer un objet au centre de la vue courante (scrolling)
        function centerAndAdd(obj) {
            const workspace = document.getElementById('workspace');
            obj.set({
                left: workspace.scrollLeft + (workspace.clientWidth / 2),
                top: workspace.scrollTop + (workspace.clientHeight / 2)
            });
            canvas.add(obj);
            canvas.setActiveObject(obj);
            canvas.renderAll();
        }

        // Z-Index
        function moveToFront() { const obj = canvas.getActiveObject(); if (obj) { canvas.bringToFront(obj); if (obj.type === 'activeSelection') canvas.discardActiveObject(); canvas.renderAll(); } }
        function moveToBack() { const obj = canvas.getActiveObject(); if (obj) { canvas.sendToBack(obj); if (obj.type === 'activeSelection') canvas.discardActiveObject(); canvas.renderAll(); } }

        const colorPicker = document.getElementById('liquidColorPicker');
        const coloniesColorPicker = document.getElementById('coloniesColorPicker');

        // Met à jour l'état des color pickers selon la sélection
        function updateColorPickers() {
            const activeObj = canvas.getActiveObject();
            
            // 1. Mise à jour du picker Liquide
            if (activeObj && activeObj.hasLiquid) {
                const liquidElement = activeObj.getObjects().find(o => o.liquidPart === true);
                if (liquidElement && liquidElement.baseHexColor) {
                    colorPicker.disabled = false;
                    colorPicker.value = liquidElement.baseHexColor;
                    colorPicker.classList.remove('opacity-50');
                } else {
                    colorPicker.disabled = true;
                    colorPicker.classList.add('opacity-50');
                    colorPicker.value = '#cccccc';
                }
            } else {
                colorPicker.disabled = true;
                colorPicker.classList.add('opacity-50');
                colorPicker.value = '#cccccc';
            }

            // 2. Mise à jour du picker Colonies
            if (activeObj && activeObj.hasColonies) {
                coloniesColorPicker.disabled = false;
                // On récupère la couleur de la première colonie pour initialiser le picker
                const firstColony = activeObj.getObjects().find(o => o.isColony === true);
                if (firstColony && firstColony.fill) {
                    coloniesColorPicker.value = firstColony.fill.startsWith('#') ? firstColony.fill : '#ef4444';
                }
                coloniesColorPicker.classList.remove('opacity-50');
            } else {
                coloniesColorPicker.disabled = true;
                coloniesColorPicker.classList.add('opacity-50');
                coloniesColorPicker.value = '#cccccc';
            }
        }

        canvas.on('selection:created', updateColorPickers);
        canvas.on('selection:updated', updateColorPickers);
        canvas.on('selection:cleared', updateColorPickers);

        // Quand on change la couleur dans le color picker liquide
        colorPicker.addEventListener('input', (e) => {
            const activeObj = canvas.getActiveObject();
            if (activeObj && activeObj.hasLiquid) {
                const liquidElement = activeObj.getObjects().find(o => o.liquidPart === true);
                if (liquidElement) {
                    const hexColor = e.target.value;
                    const alpha = liquidElement.liquidAlpha || 0.5; 
                    
                    const r = parseInt(hexColor.slice(1, 3), 16);
                    const g = parseInt(hexColor.slice(3, 5), 16);
                    const b = parseInt(hexColor.slice(5, 7), 16);
                    
                    liquidElement.set('fill', `rgba(${r}, ${g}, ${b}, ${alpha})`);
                    liquidElement.baseHexColor = hexColor; 
                    canvas.renderAll();
                }
            }
        });

        // Quand on change la couleur dans le color picker colonies
        coloniesColorPicker.addEventListener('input', (e) => {
            const activeObj = canvas.getActiveObject();
            if (activeObj && activeObj.hasColonies) {
                const hexColor = e.target.value;
                // On change la couleur de TOUTES les colonies en même temps (Culture pure)
                activeObj.getObjects().forEach(o => {
                    if (o.isColony) {
                        o.set('fill', hexColor);
                    }
                });
                canvas.renderAll();
            }
        });


        
        // NOUVEAU : Puce numérotée (Badge)
        function addBadge() {
            const circle = new fabric.Circle({ radius: 14, fill: '#ef4444', originX: 'center', originY: 'center' });
            const text = new fabric.Text('1', { fontSize: 16, fill: '#ffffff', fontWeight: 'bold', fontFamily: 'sans-serif', originX: 'center', originY: 'center' });
            
            const group = new fabric.Group([circle, text], { originX: 'center', originY: 'center' });
            group.isBadge = true; // Tag pour identifier l'objet après un import JSON
            
            attachBadgeEvent(group);
            centerAndAdd(group);
        }

        // Séparation de l'événement pour pouvoir le réattacher après un import JSON
        function attachBadgeEvent(group) {
            group.on('mousedblclick', () => {
                const textObj = group.getObjects().find(o => o.type === 'text' || o.type === 'i-text');
                if(!textObj) return;
                const inputHtml = `<label class="block text-xs font-bold mb-1">Numéro / Lettre de l'étape</label>
                                   <input type="text" id="badgeInput" value="${textObj.text}" class="w-full border border-slate-300 rounded p-2 focus:border-blue-500 outline-none">`;
                openModal("Modifier la puce", inputHtml, "Appliquer", "bg-blue-600 hover:bg-blue-700", () => {
                    const newVal = document.getElementById('badgeInput').value;
                    if(newVal) {
                        // FIX: On force le groupe à mettre à jour ses dimensions et son cache interne
                        group.removeWithUpdate(textObj);
                        textObj.set('text', String(newVal));
                        group.addWithUpdate(textObj);
                        group.set('dirty', true);
                        canvas.renderAll();
                    }
                });
            });
        }

        function addText() { centerAndAdd(new fabric.IText('Texte modifiable', { fontFamily: 'sans-serif', fontSize: 24, fill: '#1e293b', fontWeight: 'bold' })); }

        function changeTextSize(delta) {
            const obj = canvas.getActiveObject();
            if (!obj) return;
            if (obj.type === 'i-text' || obj.type === 'text') {
                obj.set('fontSize', Math.max(8, Math.min(120, obj.fontSize + delta)));
                canvas.renderAll();
            } else if (obj.type === 'activeSelection') {
                obj.forEachObject(o => { if (o.type === 'i-text' || o.type === 'text') o.set('fontSize', Math.max(8, Math.min(120, o.fontSize + delta))); });
                canvas.renderAll();
            }
        }

        function addArrow() {
            const line = new fabric.Line([0, 0, 100, 0], { stroke: '#1e293b', strokeWidth: 4, originX: 'center', originY: 'center' });
            const head = new fabric.Triangle({ width: 18, height: 18, fill: '#1e293b', left: 50, top: 0, originX: 'center', originY: 'center', angle: 90 });
            centerAndAdd(new fabric.Group([line, head], { originX: 'center', originY: 'center' }));
        }

        function addCurvedArrow() {
            const curve = new fabric.Path('M 0 50 A 50 50 0 0 1 100 50', { fill: 'transparent', stroke: '#1e293b', strokeWidth: 3 });
            const head = new fabric.Triangle({ width: 18, height: 18, fill: '#1e293b', left: 100, top: 50, originX: 'center', originY: 'bottom', angle: 180 });
            centerAndAdd(new fabric.Group([curve, head], { originX: 'center', originY: 'center' }));
        }

        function addTube() {
            const tubeBody = new fabric.Path('M 5 0 L 5 80 A 15 15 0 0 0 35 80 L 35 0', { fill: 'rgba(248, 250, 252, 0.4)', stroke: '#64748b', strokeWidth: 2 });
            // Élément liquide taggé pour le color picker
            const liquid = new fabric.Path('M 7 40 L 7 80 A 13 13 0 0 0 33 80 L 33 40 Q 20 45 7 40 Z', { fill: 'rgba(56, 189, 248, 0.5)', stroke: 'transparent', liquidPart: true, baseHexColor: '#38bdf8', liquidAlpha: 0.5 });
            const rimOuter = new fabric.Ellipse({ left: 2, top: -6, rx: 18, ry: 6, fill: 'rgba(255, 255, 255, 0.9)', stroke: '#64748b', strokeWidth: 2 });
            const rimInner = new fabric.Ellipse({ left: 7, top: -3, rx: 13, ry: 3, fill: '#e2e8f0' });
            
            const group = new fabric.Group([tubeBody, liquid, rimOuter, rimInner], { originX: 'center', originY: 'center' });
            group.hasLiquid = true; // Active le color picker pour ce groupe
            centerAndAdd(group);
        }

        // --- NOUVEAU : Portoir et Bouchon ---
        function createRackGroup(numTubes) {
            const objects = [];
            const spacing = 40;
            const rackWidth = (numTubes * spacing) + 20;

            // Panneau arrière du portoir
            const backPlate = new fabric.Rect({ width: rackWidth, height: 50, fill: 'rgba(203, 213, 225, 0.6)', stroke: '#94a3b8', strokeWidth: 2, top: 40, left: 0 });
            objects.push(backPlate);

            // Création dynamique des tubes
            for(let i=0; i<numTubes; i++) {
                const offsetX = 15 + i * spacing;
                const tubeBody = new fabric.Path('M 0 0 L 0 80 A 15 15 0 0 0 30 80 L 30 0', { fill: 'rgba(248, 250, 252, 0.7)', stroke: '#64748b', strokeWidth: 2, left: offsetX, top: 10 });
                const rimOuter = new fabric.Ellipse({ rx: 18, ry: 6, fill: 'rgba(255, 255, 255, 0.9)', stroke: '#64748b', strokeWidth: 2, left: offsetX - 3, top: 4 });
                const rimInner = new fabric.Ellipse({ rx: 13, ry: 3, fill: '#e2e8f0', left: offsetX + 2, top: 7 });
                objects.push(tubeBody, rimOuter, rimInner);
            }

            // Barres avant du portoir pour maintenir les tubes
            const frontBar1 = new fabric.Rect({ width: rackWidth, height: 12, fill: '#94a3b8', stroke: '#64748b', strokeWidth: 2, top: 60, left: 0, rx: 2 });
            const frontBar2 = new fabric.Rect({ width: rackWidth, height: 18, fill: '#cbd5e1', stroke: '#64748b', strokeWidth: 2, top: 82, left: 0, rx: 2 });
            objects.push(frontBar1, frontBar2);

            const group = new fabric.Group(objects, { originX: 'center', originY: 'center' });
            group.isRack = true;
            group.numTubes = numTubes;
            return group;
        }

        function addTubeRack(numTubes = 5) {
            const group = createRackGroup(numTubes);
            attachRackEvent(group);
            centerAndAdd(group);
        }

        function attachRackEvent(group) {
            group.on('mousedblclick', () => {
                const inputHtml = `<label class="block text-xs font-bold mb-1">Nombre de tubes (1 à 20)</label>
                                   <input type="number" id="rackInput" value="${group.numTubes}" min="1" max="20" class="w-full border border-slate-300 rounded p-2 focus:border-blue-500 outline-none">`;
                openModal("Modifier le portoir", inputHtml, "Appliquer", "bg-blue-600 hover:bg-blue-700", () => {
                    const newVal = parseInt(document.getElementById('rackInput').value);
                    if(newVal && newVal > 0 && newVal <= 20) {
                        // Pour changer le nombre d'éléments proprement, on recrée le groupe complet aux mêmes coordonnées
                        const left = group.left;
                        const top = group.top;
                        const scaleX = group.scaleX;
                        const scaleY = group.scaleY;
                        const angle = group.angle;
                        
                        canvas.remove(group);
                        
                        const newGroup = createRackGroup(newVal);
                        newGroup.set({ left, top, scaleX, scaleY, angle });
                        attachRackEvent(newGroup);
                        
                        canvas.add(newGroup);
                        canvas.setActiveObject(newGroup);
                        canvas.renderAll();
                    }
                });
            });
        }

        function addTubeCap() {
            // Bouchon en caoutchouc
            const stopper = new fabric.Polygon([{x: 0, y: 0}, {x: 26, y: 0}, {x: 20, y: 24}, {x: 6, y: 24}], { fill: '#475569', stroke: '#1e293b', strokeWidth: 2, originX: 'center', originY: 'center' });
            // Lignes de texture
            const line1 = new fabric.Line([-8, -4, 8, -4], { stroke: '#334155', strokeWidth: 2, originX: 'center', originY: 'center' });
            const line2 = new fabric.Line([-6, 4, 6, 4], { stroke: '#334155', strokeWidth: 2, originX: 'center', originY: 'center' });
            
            const group = new fabric.Group([stopper, line1, line2], { originX: 'center', originY: 'center' });
            centerAndAdd(group);
        }

        function addPetri(type) {
            const groupElements = [];
            const dishBase = new fabric.Circle({ radius: 42, fill: '#cbd5e1', originX: 'center', originY: 'center', top: 3, left: 3 });
            const dish = new fabric.Circle({ radius: 40, fill: 'rgba(255, 255, 255, 0.9)', stroke: '#94a3b8', strokeWidth: 2, originX: 'center', originY: 'center' });
            const innerRim = new fabric.Circle({ radius: 38, fill: 'transparent', stroke: '#cbd5e1', strokeWidth: 1, originX: 'center', originY: 'center' });
            groupElements.push(dishBase, dish, innerRim);

            let isLiquid = false;
            if (type === 'agar' || type === 'colonies') {
                // Élément gélose taggé pour le color picker
                const agar = new fabric.Circle({ radius: 37, fill: 'rgba(253, 224, 71, 0.6)', originX: 'center', originY: 'center', liquidPart: true, baseHexColor: '#fde047', liquidAlpha: 0.6 });
                groupElements.push(agar);
                isLiquid = true;
            }

            if (type === 'colonies') {
                const colors = ['#ef4444', '#f59e0b', '#3b82f6', '#22c55e', '#d946ef'];
                for(let i=0; i<15; i++) {
                    const angle = Math.random() * Math.PI * 2; const rad = Math.random() * 28;
                    // Ajout du tag "isColony: true" pour que le script puisse les identifier
                    groupElements.push(new fabric.Circle({ radius: Math.random() * 2.5 + 1.5, fill: colors[Math.floor(Math.random() * colors.length)], left: Math.cos(angle) * rad, top: Math.sin(angle) * rad, originX: 'center', originY: 'center', isColony: true }));
                }
            }
            
            const group = new fabric.Group(groupElements, { originX: 'center', originY: 'center' });
            if(isLiquid) group.hasLiquid = true;
            // Ajout du tag global pour activer le sélecteur
            if(type === 'colonies') group.hasColonies = true; 
            centerAndAdd(group);
        }

        function addErlenmeyer() {
            const body = new fabric.Path('M -10 -50 L 10 -50 L 10 -20 L 40 50 A 5 5 0 0 1 35 55 L -35 55 A 5 5 0 0 1 -40 50 L -10 -20 Z', { fill: 'rgba(248, 250, 252, 0.6)', stroke: '#64748b', strokeWidth: 2, originX: 'center', originY: 'center' });
            const liquid = new fabric.Path('M -18 0 L 18 0 L 38 48 A 4 4 0 0 1 34 53 L -34 53 A 4 4 0 0 1 -38 48 Z', { fill: 'rgba(56, 189, 248, 0.4)', stroke: 'transparent', originX: 'center', originY: 'center', top: 15, liquidPart: true, baseHexColor: '#38bdf8', liquidAlpha: 0.4 });
            const rim = new fabric.Ellipse({ rx: 12, ry: 4, top: -50, fill: 'rgba(255, 255, 255, 0.9)', stroke: '#64748b', strokeWidth: 2, originX: 'center', originY: 'center' });
            
            const group = new fabric.Group([body, liquid, rim], { originX: 'center', originY: 'center' });
            group.hasLiquid = true;
            centerAndAdd(group);
        }

        function addBeaker() {
            const body = new fabric.Rect({ width: 70, height: 90, fill: 'rgba(248, 250, 252, 0.6)', stroke: '#64748b', strokeWidth: 2, rx: 4, originX: 'center', originY: 'center' });
            const spout = new fabric.Path('M -35 -45 L -45 -45 L -35 -35 Z', { fill: 'rgba(248, 250, 252, 0.6)', stroke: '#64748b', strokeWidth: 2, originX: 'center', originY: 'center' });
            const liquid = new fabric.Rect({ width: 66, height: 60, fill: 'rgba(56, 189, 248, 0.4)', rx: 2, originX: 'center', originY: 'center', top: 14, liquidPart: true, baseHexColor: '#38bdf8', liquidAlpha: 0.4 });
            const marks = [];
            for(let i=0; i<4; i++) marks.push(new fabric.Line([-35, 10 - i*15, -25, 10 - i*15], { stroke: '#64748b', strokeWidth: 1.5, originX: 'center', originY: 'center' }));
            
            const group = new fabric.Group([spout, body, liquid, ...marks], { originX: 'center', originY: 'center' });
            group.hasLiquid = true;
            centerAndAdd(group);
        }

        function addStomacherBag() {
            const bag = new fabric.Rect({ width: 70, height: 100, fill: 'rgba(255, 255, 255, 0.8)', stroke: '#64748b', strokeWidth: 2, rx: 4, originX: 'center', originY: 'center' });
            const seal = new fabric.Line([-35, -30, 35, -30], { stroke: '#64748b', strokeWidth: 1.5, strokeDashArray: [4, 4], originX: 'center', originY: 'center' });
            const liquid = new fabric.Path('M -34 10 L 34 10 L 34 45 A 3 3 0 0 1 31 48 L -31 48 A 3 3 0 0 1 -34 45 Z', { fill: 'rgba(253, 224, 71, 0.4)', originX: 'center', originY: 'center', liquidPart: true, baseHexColor: '#fde047', liquidAlpha: 0.4 });
            
            const group = new fabric.Group([bag, seal, liquid], { originX: 'center', originY: 'center' });
            group.hasLiquid = true;
            centerAndAdd(group);
        }

        // --- NOUVEAUX ÉLÉMENTS ---

        // Flacon de Gélose
        function addFlask() {
            const neck = new fabric.Rect({ width: 20, height: 35, fill: 'rgba(248, 250, 252, 0.6)', stroke: '#64748b', strokeWidth: 2, top: -55, originX: 'center', originY: 'center' });
            const cap = new fabric.Rect({ width: 26, height: 14, fill: '#3b82f6', stroke: '#1e3a8a', strokeWidth: 2, top: -70, rx: 3, originX: 'center', originY: 'center' });
            const body = new fabric.Path('M -10 -37.5 L 10 -37.5 L 35 -5 L 35 60 A 8 8 0 0 1 27 68 L -27 68 A 8 8 0 0 1 -35 60 L -35 -5 Z', { fill: 'rgba(248, 250, 252, 0.6)', stroke: '#64748b', strokeWidth: 2, originX: 'center', originY: 'center' });
            // Le liquide réagit au sélecteur de couleur
            const liquid = new fabric.Path('M -32 20 L 32 20 L 32 58 A 5 5 0 0 1 27 63 L -27 63 A 5 5 0 0 1 -32 58 Z', { fill: 'rgba(253, 224, 71, 0.6)', stroke: 'transparent', originX: 'center', originY: 'center', liquidPart: true, baseHexColor: '#fde047', liquidAlpha: 0.6 });
            
            const group = new fabric.Group([neck, body, liquid, cap], { originX: 'center', originY: 'center' });
            group.hasLiquid = true;
            centerAndAdd(group);
        }

        // Échantillon : Crevette (dessinée via une superposition de formes pour un rendu organique)
        function addShrimp() {
            const p1 = new fabric.Circle({radius: 14, fill: '#fb923c', stroke: '#ea580c', strokeWidth: 2, left: 15, top: -20});
            const p2 = new fabric.Circle({radius: 12, fill: '#fb923c', stroke: '#ea580c', strokeWidth: 2, left: 20, top: -5});
            const p3 = new fabric.Circle({radius: 10, fill: '#fb923c', stroke: '#ea580c', strokeWidth: 2, left: 18, top: 10});
            const p4 = new fabric.Circle({radius: 8, fill: '#fb923c', stroke: '#ea580c', strokeWidth: 2, left: 12, top: 22});
            const p5 = new fabric.Circle({radius: 6, fill: '#fb923c', stroke: '#ea580c', strokeWidth: 2, left: 4, top: 30});
            
            const tail1 = new fabric.Path('M 4 30 L -8 42 L 12 38 Z', { fill: '#fb923c', stroke: '#ea580c', strokeWidth: 2 });
            const tail2 = new fabric.Path('M 4 30 L -12 32 L 2 24 Z', { fill: '#fb923c', stroke: '#ea580c', strokeWidth: 2 });
            const eye = new fabric.Circle({ radius: 2.5, fill: '#1e293b', left: 22, top: -22 });
            const antenna = new fabric.Path('M 20 -20 Q 5 -35 25 -45', { fill: 'transparent', stroke: '#ea580c', strokeWidth: 1.5 });

            const group = new fabric.Group([tail1, tail2, p5, p4, p3, p2, p1, eye, antenna], { originX: 'center', originY: 'center' });
            centerAndAdd(group);
        }

        // Échantillon : Boudin Noir
        function addBlackPudding() {
            const body = new fabric.Rect({ width: 80, height: 26, fill: '#450a0a', stroke: '#2a0404', strokeWidth: 2, rx: 13, ry: 13, originX: 'center', originY: 'center' });
            const knot1 = new fabric.Path('M -40 0 L -50 -8 L -50 8 Z', { fill: '#450a0a', stroke: '#2a0404', strokeWidth: 1, originX: 'center', originY: 'center' });
            const knot2 = new fabric.Path('M 40 0 L 50 -8 L 50 8 Z', { fill: '#450a0a', stroke: '#2a0404', strokeWidth: 1, originX: 'center', originY: 'center' });
            // Reflet pour donner un effet de "boyau" brillant
            const highlight = new fabric.Path('M -25 -6 Q 0 -8 25 -6', { fill: 'transparent', stroke: 'rgba(255,255,255,0.15)', strokeWidth: 3, strokeLineCap: 'round', originX: 'center', originY: 'center' });

            const group = new fabric.Group([knot1, knot2, body, highlight], { originX: 'center', originY: 'center' });
            centerAndAdd(group);
        }

        // --- FIN NOUVEAUX ÉLÉMENTS ---

        function addEppendorf() {

        // --- NOUVEAU : Balance de précision ---
        function addBalance() {
            const base = new fabric.Rect({ width: 140, height: 40, fill: '#cbd5e1', stroke: '#64748b', strokeWidth: 2, rx: 6, originX: 'center', originY: 'center', top: 10 });
            const panBase = new fabric.Rect({ width: 60, height: 10, fill: '#94a3b8', stroke: '#64748b', strokeWidth: 2, top: -15, originX: 'center', originY: 'center' });
            const pan = new fabric.Rect({ width: 100, height: 6, fill: '#f1f5f9', stroke: '#64748b', strokeWidth: 2, top: -20, rx: 2, originX: 'center', originY: 'center' });
            const screen = new fabric.Rect({ width: 70, height: 22, fill: '#0f172a', top: 10, left: -20, rx: 2, originX: 'center', originY: 'center' });
            
            // Texte affichant la valeur de base de 25.0 g
            const weightText = new fabric.Text('25.0 g', { fontSize: 14, fill: '#10b981', top: 11, left: -20, fontFamily: 'monospace', fontWeight: 'bold', originX: 'center', originY: 'center' });

            const group = new fabric.Group([base, panBase, pan, screen, weightText, btnT, btnO], { originX: 'center', originY: 'center' });
            group.isBalance = true; // Tag pour l'import JSON
            
            attachBalanceEvent(group);

        }

        // Événement modifiant la valeur de la balance au double-clic
        function attachBalanceEvent(group) {
            group.on('mousedblclick', () => {
                const textObj = group.getObjects().find(o => o.type === 'text' && o.fill === '#10b981');
                if(!textObj) return;
                const inputHtml = `<label class="block text-xs font-bold mb-1">Masse affichée (ex: 25.0 g)</label>
                                   <input type="text" id="balanceInput" value="${textObj.text}" class="w-full border border-slate-300 rounded p-2 focus:border-blue-500 outline-none">`;
                openModal("Réglage de la balance", inputHtml, "Appliquer", "bg-blue-600 hover:bg-blue-700", () => {
                    const newVal = document.getElementById('balanceInput').value;
                    if(newVal) {
                        group.removeWithUpdate(textObj);
                        textObj.set('text', newVal);
                        group.addWithUpdate(textObj);
                        group.set('dirty', true);
                        canvas.renderAll();
                    }
                });
            });
        }

        // Séparation de l'événement pour l'Étuve
        function attachIncubatorEvent(group) {
            group.on('mousedblclick', () => {
                const tempText = group.getObjects().find(o => o.type === 'text' && o.fill === '#ef4444');
                if(!tempText) return;
                const inputHtml = `<label class="block text-xs font-bold mb-1">Température (°C)</label>
                                   <input type="number" id="tempInput" step="0.5" value="${tempText.text}" class="w-full border border-slate-300 rounded p-2 focus:border-blue-500 outline-none">`;
                openModal("Réglage de l'Étuve", inputHtml, "Appliquer", "bg-blue-600 hover:bg-blue-700", () => {
                    const newVal = document.getElementById('tempInput').value;
                    if(newVal) { 
                        // FIX: On force le groupe à mettre à jour ses dimensions et son cache interne
                        group.removeWithUpdate(tempText);
                        tempText.set('text', String(newVal)); 
                        group.addWithUpdate(tempText);
                        group.set('dirty', true);
                        canvas.renderAll(); 
                    }
                });
            });
        }

            const flameOuter = new fabric.Path('M 0 0 Q -12 -15 0 -35 Q 12 -15 0 0', { fill: 'rgba(249, 115, 22, 0.7)', originX: 'center', originY: 'center', top: -27 });
            const flameInner = new fabric.Path('M 0 0 Q -6 -8 0 -20 Q 6 -8 0 0', { fill: 'rgba(56, 189, 248, 0.9)', originX: 'center', originY: 'center', top: -20 });

        function exportPNG() {
            canvas.discardActiveObject();
            canvas.renderAll();
            const dataURL = canvas.toDataURL({ format: 'png', multiplier: 2, width: canvas.width, height: canvas.height, backgroundColor: '#ffffff' });
            const link = document.createElement('a'); link.download = 'protocole_microbio.png'; link.href = dataURL; link.click();
        }

        function exportSVG() {
            // Désélectionne l'objet actif pour ne pas voir la bordure bleue de sélection sur l'export
            canvas.discardActiveObject();
            canvas.renderAll();
            
            // Fabric.js génère le code SVG de tout le canevas
            const svgData = canvas.toSVG({
                width: canvas.width,
                height: canvas.height
            });
            
            // Création d'un fichier virtuel (Blob) pour déclencher le téléchargement
            const blob = new Blob([svgData], { type: "image/svg+xml;charset=utf-8" });
            const url = URL.createObjectURL(blob);
            
            const link = document.createElement('a');
            link.download = 'protocole_microbio.svg';
            link.href = url;
            link.click();
            
            // Nettoyage de la mémoire
            setTimeout(() => URL.revokeObjectURL(url), 100);
        }

        // --- NOUVEAU : Fonctions d'Import / Export JSON ---

        function exportJSON() {
            // Liste des propriétés personnalisées indispensables au fonctionnement des outils (couleurs, double-clics)
            const customPropsToSave = ['hasLiquid', 'liquidPart', 'baseHexColor', 'liquidAlpha', 'hasColonies', 'isColony', 'isBadge', 'isIncubator', 'isBalance', 'isRack', 'numTubes'];
            
            const jsonData = canvas.toJSON(customPropsToSave);
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(jsonData));
            
            const link = document.createElement('a');
            link.download = "projet_microbiodraw.json";
            link.href = dataStr;
            link.click();
        }

        function triggerImport() {
            document.getElementById('importJsonInput').click();
        }

        function importJSON(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const jsonData = e.target.result;
                canvas.loadFromJSON(jsonData, function() {
                    // Une fois le canevas chargé, on ré-attache les événements interactifs (qui ne sont pas dans le JSON)
                    canvas.getObjects().forEach(obj => {
                        if (obj.isBadge) attachBadgeEvent(obj);
                        if (obj.isIncubator) attachIncubatorEvent(obj);
                        if (obj.isBalance) attachBalanceEvent(obj);
                        if (obj.isRack) attachRackEvent(obj);
                    });
                    
                    canvas.renderAll();
                    updateColorPickers(); // Met à jour l'UI
                    
                    // On vide le champ file pour permettre de recharger le même fichier plus tard si besoin
                    document.getElementById('importJsonInput').value = "";
                });
            };
            reader.readAsText(file);
        }

    </script>
